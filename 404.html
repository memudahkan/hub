<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - M2D Link Hub</title>
  <meta name="description" content="Halaman tidak ditemukan di M2D Link Hub.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://hub.memudahkan.com/404.html">

  <link rel="icon" href="/assets/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon/favicon-48x48.png">
  <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png">
  <meta name="theme-color" content="#0f1316">

<style>
    :root {
      --bg: #0b0f12;
      --panel: #11161b;
      --line: #24303a;
      --text: #d7e2ea;
      --muted: #8ea1af;
      --green: #7ee787;
      --green-2: #9ff5a7;
      --red: #ff7b72;
      --yellow: #e3b341;
      --blue: #79c0ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(121,192,255,0.08), transparent 35%),
        radial-gradient(circle at bottom, rgba(126,231,135,0.07), transparent 35%),
        var(--bg);
      color: var(--text);
      font: 15px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .terminal {
      width: 100%;
      max-width: 900px;
      background: rgba(17, 22, 27, 0.96);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
    }

    .bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #0f1419;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .red { background: #ff5f56; }
    .yellow { background: #ffbd2e; }
    .green { background: #27c93f; }

    .title {
      margin-left: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .screen {
      padding: 20px 18px;
      min-height: 440px;
    }

    .line {
      margin: 0 0 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt { color: var(--green); }
    .host { color: var(--blue); }
    .path { color: var(--yellow); }
    .error { color: var(--red); }
    .muted { color: var(--muted); }

    .input-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 10px;
    }

    .prompt-label {
      color: var(--green);
      white-space: nowrap;
      padding-top: 1px;
    }

    .cmdline {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: 0;
      outline: none;
      color: var(--text);
      font: inherit;
      caret-color: var(--green);
      padding: 0;
      margin: 0;
    }

    .hint {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .kbd {
      display: inline-block;
      padding: 1px 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--green-2);
      background: #0d1217;
    }

    @media (max-width: 560px) {
      .screen { min-height: 380px; }
      .title { font-size: 0.86rem; }
    }
  </style>
</head>
<body>
  <main class="terminal" aria-label="Terminal 404">
    <div class="bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <div class="title">hub.memudahkan.com — not-found shell</div>
    </div>

    <section class="screen">
      <div id="output">
        <p class="line"><span class="prompt">system</span>: memuat halaman...</p>
        <p class="line error">error 404: page not found</p>
        <p class="line">Alamat yang diminta: <span class="path" id="missing-path">/</span></p>
        <p class="line muted">Ketik <span class="kbd">help</span> untuk melihat perintah yang tersedia.</p>
      </div>

      <div class="input-row">
        <label class="prompt-label" for="cmd"><span class="prompt">visitor@hub</span>:<span class="path">~</span>$</label>
        <input id="cmd" class="cmdline" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Masukkan perintah">
      </div>

      <div class="hint">
        Perintah cepat: <span class="kbd">help</span> <span class="kbd">home</span> <span class="kbd">back</span> <span class="kbd">clear</span> <span class="kbd">path</span>
      </div>
    </section>
  </main>

  <script>
    const output = document.getElementById('output');
    const cmd = document.getElementById('cmd');
    const missingPath = window.location.pathname || '/';
    document.getElementById('missing-path').textContent = missingPath;

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function addLine(html, cls = 'line') {
      const p = document.createElement('p');
      p.className = cls;
      p.innerHTML = html;
      output.appendChild(p);
      window.scrollTo(0, document.body.scrollHeight);
    }

    function runCommand(value) {
      const raw = value || '';
      const command = raw.trim().toLowerCase();

      addLine('<span class=\"prompt\">visitor@hub</span>:<span class=\"path\">~</span>$ ' + escapeHtml(raw));

      if (!command) return;

      if (command === 'help') {
        addLine('Perintah tersedia: <span class="kbd">home</span>, <span class="kbd">back</span>, <span class="kbd">clear</span>, <span class="kbd">path</span>.');
        return;
      }

      if (command === 'home') {
        addLine('Mengalihkan ke / ...', 'line muted');
        setTimeout(() => { window.location.href = '/'; }, 250);
        return;
      }

      if (command === 'back') {
        addLine('Kembali ke halaman sebelumnya ...', 'line muted');
        setTimeout(() => { history.back(); }, 250);
        return;
      }

      if (command === 'clear') {
        output.innerHTML = '';
        return;
      }

      if (command === 'path') {
        addLine('Path yang gagal dibuka: <span class="path">' + escapeHtml(missingPath) + '</span>');
        return;
      }

      addLine('command not found: <span class="error">' + escapeHtml(command) + '</span>');
      addLine('Ketik <span class="kbd">help</span> untuk melihat perintah yang tersedia.', 'line muted');
    }

    cmd.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const value = cmd.value;
        cmd.value = '';
        runCommand(value);
      }
    });

    window.addEventListener('load', () => {
      cmd.focus();
    });

    document.addEventListener('click', () => {
      cmd.focus();
    });
  </script>
</body>
</html>
