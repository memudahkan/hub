<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - M2D Link Hub</title>
  <meta name="description" content="Halaman tidak ditemukan di M2D Link Hub.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://hub.memudahkan.com/404.html">

  <link rel="icon" href="/assets/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon/favicon-48x48.png">
  <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png">
  <meta name="theme-color" content="#0c0c0c">

  <style>
    :root {
      --bg: #0c0c0c;
      --fg: #cccccc;
      --muted: #9a9a9a;
      --line: #2a2a2a;
      --white: #f2f2f2;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.6 Consolas, "Courier New", monospace;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .cmd {
      width: 100%;
      max-width: 760px;
      border: 1px solid var(--line);
      background: #0c0c0c;
    }

    .bar {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .screen {
      padding: 18px 16px;
    }

    p {
      margin: 0 0 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .muted { color: var(--muted); }
    .strong { color: var(--white); }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 14px;
    }

    .label {
      white-space: nowrap;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--fg);
      font: inherit;
      padding: 0;
      margin: 0;
      caret-color: var(--white);
    }

    .hint {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="cmd" aria-label="404 command prompt">
    <div class="bar">Command Prompt — hub.memudahkan.com</div>

    <section class="screen">
      <div id="output">
        <p>C:\\hub> open <span id="missing-path">/</span></p>
        <p class="strong">The system cannot find the page specified.</p>
        <p class="muted">Mungkin URL salah, halamannya dipindah, atau memang belum dibuat. Ketik help untuk melihat perintah yang tersedia.</p>
      </div>

      <div class="input-row">
        <span class="label">C:\\hub></span>
        <input id="cmd" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Masukkan perintah">
      </div>

      <div class="hint">Hint: ketik help lalu tekan Enter</div>
    </section>
  </main>

  <script>
    const output = document.getElementById('output');
    const cmd = document.getElementById('cmd');
    const missingPath = window.location.pathname || '/';
    document.getElementById('missing-path').textContent = missingPath;

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function addLine(text, className = '') {
      const p = document.createElement('p');
      if (className) p.className = className;
      p.innerHTML = text;
      output.appendChild(p);
    }

    function runCommand(raw) {
      const value = raw.trim().toLowerCase();
      addLine('C:\\\\hub&gt; ' + escapeHtml(raw));

      if (!value) return;

      if (value === 'help') {
        addLine('help  - tampilkan bantuan');
        addLine('home  - kembali ke beranda');
        addLine('path  - tampilkan path yang gagal dibuka');
        addLine('clr   - bersihkan layar');
        return;
      }

      if (value === 'home') {
        addLine('Opening home...', 'muted');
        setTimeout(() => { window.location.href = '/'; }, 250);
        return;
      }

      if (value === 'path') {
        addLine(escapeHtml(missingPath));
        return;
      }

      if (value === 'clr') {
        output.innerHTML = '';
        return;
      }

      addLine('Unknown command: ' + escapeHtml(value), 'muted');
    }

    cmd.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const value = cmd.value;
        cmd.value = '';
        runCommand(value);
      }
    });

    window.addEventListener('load', () => cmd.focus());
    document.addEventListener('click', () => cmd.focus());
  </script>
</body>
</html>
